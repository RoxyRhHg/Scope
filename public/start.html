<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scope | A股价值筛选</title>
  <style>
    :root{--bg:#0b0f14;--s1:#141a22;--s2:#1a222c;--bd:#243040;--tx:#e0e6ed;--mt:#7a8a9e;--gn:#22c55e;--gd:#eab308;--rd:#ef4444;--bl:#3b82f6;--ac:#3b82f6;--pu:#a855f7}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,"SF Pro Text","Segoe UI",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
    .wrap{max-width:1400px;margin:0 auto;padding:12px}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .hdr h1{font-size:17px;font-weight:700;white-space:nowrap}
    .hdr-sm{color:var(--mt);font-size:11px}
    .hdr-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .pill{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
    .pill.live{background:#0f3a2a;color:var(--gn)}.pill.err{background:#3a0f0f;color:var(--rd)}
    .btn{padding:7px 14px;border:1px solid var(--bd);border-radius:5px;background:var(--s2);color:var(--tx);cursor:pointer;font-size:12px;transition:.15s}
    .btn:hover{border-color:var(--ac);background:#1e2a3a}.btn.pri{background:var(--ac);border-color:var(--ac);color:#fff}
    .tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--bd)}
    .tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--mt);transition:.15s}
    .tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .chip{padding:4px 12px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--mt);transition:.15s;user-select:none}
    .chip:hover{border-color:var(--ac);color:var(--tx)}.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
    .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .bar input[type=text]{padding:7px 12px;border:1px solid var(--bd);border-radius:5px;background:var(--s1);color:var(--tx);font-size:13px;width:220px}
    .bar input[type=text]::placeholder{color:var(--mt)}
    .bar select{padding:7px 10px;border:1px solid var(--bd);border-radius:5px;background:var(--s1);color:var(--tx);font-size:12px}
    .bar .info{color:var(--mt);font-size:11px;margin-left:auto}
    .tw{overflow-x:auto;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{text-align:left;padding:7px 8px;color:var(--mt);font-weight:500;font-size:11px;border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;background:var(--bg)}
    td{padding:6px 8px;border-bottom:1px solid #1a222c;white-space:nowrap}
    tr:hover td{background:var(--s2)}tr.act td{background:#1a2e44}
    .nm{display:flex;flex-direction:column;gap:1px}.nm b{font-size:13px}.nm small{color:var(--mt);font-size:10px}
    .pr{font-weight:600;font-variant-numeric:tabular-nums}
    .bz{color:var(--gn);font-weight:500}.iv{color:var(--gd);font-weight:600}
    .mg{font-weight:600}.mg-h{color:var(--gn)}.mg-o{color:var(--gd)}.mg-l{color:var(--mt)}
    .up{color:var(--gn);font-weight:600}.br{color:var(--mt);max-width:140px;overflow:hidden;text-overflow:ellipsis}
    .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:var(--s2);color:var(--mt);margin-right:3px}
    .tag.g{background:#0f3a2a;color:var(--gn)}.tag.y{background:#2a2a0f;color:var(--gd)}.tag.r{background:#3a0f0f;color:var(--rd)}.tag.hot{background:#3a1a0f;color:#ff8c42}
    .sig{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;background:#1a2e44;color:var(--bl);margin-right:3px}
    .sec{margin-bottom:16px}.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .sec-h h2{font-size:15px;font-weight:600}.sec-h .sub{color:var(--mt);font-size:11px}
    .ld{text-align:center;padding:40px;color:var(--mt)}
    .ld .sp{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:8px}
    @keyframes sp{to{transform:rotate(360deg)}}
    .err{background:#2a0f0f;border:1px solid #5a1a1a;border-radius:8px;padding:14px;color:var(--rd);margin:16px 0}
    .err pre{font-size:11px;white-space:pre-wrap;margin-top:6px;color:#f88}
    .prob{font-weight:700;font-size:14px}.prob-hi{color:var(--gn)}.prob-md{color:var(--gd)}.prob-lo{color:var(--mt)}
    /* 热点卡片 */
    .hot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;margin-bottom:16px}
    .hot-card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px;cursor:pointer;transition:.15s}
    .hot-card:hover{border-color:var(--ac)}
    .hot-card .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .hot-card .hd h3{font-size:14px;font-weight:600}
    .hot-card .hd .ct{font-size:11px;color:var(--mt)}
    .hot-bar{background:var(--bd);border-radius:3px;height:5px;margin-bottom:8px;overflow:hidden}
    .hot-bar .fill{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--gn),var(--ac))}
    .score-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
    .score-hi{background:#0f3a2a;color:var(--gn)}.score-md{background:#2a2a0f;color:var(--gd)}.score-lo{background:var(--s2);color:var(--mt)}
    /* 热点内的股票行 */
    .hs-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid #1a222c;cursor:pointer}
    .hs-row:hover{background:var(--s2);border-radius:4px}
    .hs-row .hs-name{flex:1;min-width:0}.hs-row .hs-name b{font-size:13px}
    .hs-row .hs-pr{color:var(--gn);font-weight:600;min-width:50px;text-align:right}
    .hs-row .hs-bz{color:var(--gn);font-size:11px;min-width:100px}
    .hs-row .hs-mg{font-weight:600;font-size:11px;min-width:45px;text-align:right}
    /* 详情面板（右侧固定） */
    .detail-overlay{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--s1);border-left:1px solid var(--bd);z-index:100;overflow-y:auto;transform:translateX(100%);transition:transform .2s ease;box-shadow:-4px 0 20px rgba(0,0,0,.5)}
    .detail-overlay.open{transform:translateX(0)}
    .detail-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;padding:4px 8px}
    .detail-close:hover{color:var(--tx)}
    .detail-body{padding:16px;padding-top:40px}
    .detail-body h2{font-size:16px;margin-bottom:4px}
    .detail-body .sub{color:var(--mt);font-size:12px;margin-bottom:12px}
    .dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .di{background:var(--s2);border-radius:5px;padding:8px}.di .lb{font-size:10px;color:var(--mt);margin-bottom:3px}.di .vl{font-size:15px;font-weight:600}
    .detail-section{margin-bottom:14px}.detail-section h3{font-size:13px;color:var(--mt);margin-bottom:6px;font-weight:500}
    .detail-section p{font-size:12px;line-height:1.7;color:var(--tx)}
    .detail-concepts{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
    .detail-signals{display:flex;gap:4px;flex-wrap:wrap}
    /* overlay bg */
    .overlay-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99;display:none}
    .overlay-bg.show{display:block}
    @media(max-width:768px){
      .detail-overlay{width:100%}
      .hot-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="wrap" id="app"><div class="ld"><div class="sp"></div><br>加载中...</div></div>
<div class="overlay-bg" id="overlayBg" onclick="closeDetail()"></div>
<div class="detail-overlay" id="detailPanel"><button class="detail-close" onclick="closeDetail()">&times;</button><div class="detail-body" id="detailBody"></div></div>

<script>
if(location.protocol==='file:'){document.getElementById('app').innerHTML='<div class="err"><strong>请通过服务器访问</strong><pre>http://127.0.0.1:4173</pre></div>';throw 0}

const A='/api';
let D=null,ETFS=null,PRED=null,Q='',IND='全部',CON='',TAB='home';
let searchTimer=null,isComposing=false;
const CORE_CONCEPTS=['半导体','存储','芯片','AI','算力','光通信','光学光电子','显示屏','CPO','具身智能','物理AI','能源','银行','ARVR','数据'];

// ── 自选股 ──
let WATCHLIST=JSON.parse(localStorage.getItem('scope_watchlist')||'[]');
function saveWatchlist(){localStorage.setItem('scope_watchlist',JSON.stringify(WATCHLIST))}
function toggleWatchlist(code){
  const i=WATCHLIST.indexOf(code);
  if(i>=0)WATCHLIST.splice(i,1);else WATCHLIST.push(code);
  saveWatchlist();render();
}
function isWatched(code){return WATCHLIST.includes(code)}

const f=(v,d=2)=>v!=null?v.toFixed(d):'-';
const fp=v=>v!=null?v.toFixed(1)+'%':'-';
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function load(){
  const el=document.getElementById('app');
  el.innerHTML='<div class="ld"><div class="sp"></div><br>加载市场数据...</div>';
  try{
    const[r1,r2,r3]=await Promise.all([fetch(A+'/dashboard'),fetch(A+'/etf'),fetch(A+'/limitup-predict?limit=50&maxPrice=90').catch(()=>null)]);
    if(!r1.ok)throw new Error('dashboard API '+r1.status);
    D=await r1.json();
    if(!D.snapshot?.items?.length)throw new Error('快照数据为空');
    try{ETFS=await r2.json()}catch(e){ETFS={etfs:[],types:[]}}
    try{if(r3&&r3.ok)PRED=await r3.json();else PRED=null}catch(e){PRED=null}
    render();
  }catch(e){
    el.innerHTML='<div class="err"><strong>加载失败</strong><pre>'+esc(e.message)+'</pre><button class="btn pri" style="margin-top:8px" onclick="load()">重试</button></div>';
  }
}

function rank(items){
  return items.filter(s=>s.price>0&&s.code&&!String(s.code).startsWith('688')&&s.price<=90)
    .map(s=>({...s,_t:s.scores?.total??0,_c:s.scores?.core??0,_a:s.scores?.auxiliary??0,_cap:s.scores?.capitalFit??0,_tier:s.valuationTier||'-',_mg:s.marginOfSafety??null,_bl:s.buyZoneLow??null,_bh:s.buyZoneHigh??null,_op:s.optimisticValue??null}))
    .sort((a,b)=>b._t-a._t);
}

function pickFocus(stks){
  return stks.filter(s=>{
    if(s._c<70||s._mg==null||s._mg<10||s._tier==='高估'||s._tier==='偏高估')return false;
    if(s._bl!=null&&s._bh!=null&&s.price>=s._bl&&s.price<=s._bh)return true;
    if(s._op!=null&&s.price<=s._op*0.9)return true;
    return false;
  }).slice(0,40);
}

function sumInd(stks){
  const m={};for(const s of stks){const i=s.industry||'?';if(!m[i])m[i]={n:i,c:0,ts:0,cs:0};m[i].c++;m[i].ts+=s._t;m[i].cs+=s._c}
  return Object.values(m).map(d=>({...d,at:Math.round(d.ts/d.c),ac:Math.round(d.cs/d.c)})).sort((a,b)=>b.at-a.at);
}

function buildHotThemes(ranked,predItems){
  const tm={};
  const add=(s,c,w)=>{if(!tm[c])tm[c]={name:c,pc:0,sc:0,ts:0,codes:new Set()};tm[c].sc++;tm[c].ts+=(s._t||s.totalScore||0);tm[c].codes.add(s.code);if(w)tm[c].pc++};
  if(predItems)for(const p of predItems)for(const c of p.concepts??[])add(p,c,true);
  for(const s of ranked.slice(0,200))for(const c of s.concepts??[])add(s,c,false);
  return Object.values(tm).filter(t=>t.sc>=3).map(t=>({...t,heat:t.pc*10+t.sc+Math.round(t.ts/Math.max(t.sc,1)),avg:Math.round(t.ts/Math.max(t.sc,1)),codes:undefined})).sort((a,b)=>b.heat-a.heat).slice(0,12);
}

function stocksForConcept(ranked,concept,limit=10){
  return ranked.filter(s=>(s.concepts??[]).includes(concept)&&s._c>=65&&(s._mg==null||s._mg>0)).sort((a,b)=>b._t-a._t).slice(0,limit);
}

// ── 详情面板 ──
function openDetail(code){
  const items=D?.snapshot?.items||[];
  const s=items.find(x=>x.code===code);
  if(!s)return;
  const pred=PRED?.predictions?.find(p=>p.code===code);
  const bz=s.buyZoneLow!=null?'¥'+f(s.buyZoneLow,1)+' ~ ¥'+f(s.buyZoneHigh,1):'待定';
  const up=s.optimisticValue?((s.optimisticValue-s.price)/Math.max(s.price,1)*100):null;
  const mg=s.marginOfSafety??0;
  const tier=s.valuationTier||'-';
  const tierCls=tier==='低估'||tier==='合理偏低'?'g':tier==='合理'||tier==='合理偏高'?'y':'r';

  const w=isWatched(code);
  document.getElementById('detailBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <h2 style="flex:1">${esc(s.name)}</h2>
      <span style="cursor:pointer;font-size:22px;${w?'color:var(--gd)':'color:var(--mt)'}" onclick="toggleWatchlist('${esc(code)}');openDetail('${esc(code)}')">${w?'★':'☆'}</span>
    </div>
    <div class="sub">${esc(s.code)} · ${esc(s.industry)} · <span class="tag ${tierCls}">${esc(tier)}</span></div>

    <div class="detail-concepts">${(s.concepts??[]).map(c=>'<span class="tag">'+esc(c)+'</span>').join('')}</div>

    <div class="dg">
      <div class="di"><div class="lb">现价</div><div class="vl pr">¥${f(s.price)}</div></div>
      <div class="di"><div class="lb">安全边际</div><div class="vl ${mg>=20?'mg-h':'mg-o'}">${fp(mg)}</div></div>
      <div class="di"><div class="lb">建议买入区间</div><div class="vl bz">${bz}</div></div>
      <div class="di"><div class="lb">理想价值（卖出参考）</div><div class="vl iv">${s.optimisticValue!=null?'¥'+f(s.optimisticValue,1):'-'}</div></div>
      <div class="di"><div class="lb">上涨空间</div><div class="vl up">${up!=null?'+'+up.toFixed(0)+'%':'-'}</div></div>
      <div class="di"><div class="lb">总分</div><div class="vl">${f(s.scores?.total,1)}</div></div>
      <div class="di"><div class="lb">核心价值分</div><div class="vl">${f(s.scores?.core,1)}</div></div>
      <div class="di"><div class="lb">PE / PB</div><div class="vl">${s.pe!=null?f(s.pe,1):'-'} / ${s.pb!=null?f(s.pb,2):'-'}</div></div>
    </div>

    <div class="detail-section">
      <h3>生意模式</h3>
      <p>${esc(s.businessBrief || '暂无生意模式描述')}</p>
    </div>

    <div class="detail-section">
      <h3>投资结论</h3>
      <p>${esc(s.conclusion || '暂无结论')}</p>
    </div>

    ${pred?`
    <div class="detail-section">
      <h3>涨停预测</h3>
      <p>概率：<strong>${esc(pred.probability||'-')}</strong> · 总分：${f(pred.totalScore,1)} · 历史涨停 ${pred.limitupCount||0} 次</p>
      <div class="detail-signals" style="margin-top:6px">${(pred.signals??[]).map(s=>'<span class="sig">'+esc(s)+'</span>').join('')}</div>
      <p style="margin-top:6px">操作建议：<span class="tag ${pred.action?.includes('强烈')?'g':pred.action?.includes('纳入')?'y':''}">${esc(pred.action||'-')}</span></p>
    </div>`:''}

    ${s.riskNote?`<div class="detail-section"><h3>风险提示</h3><p style="color:var(--rd)">${esc(s.riskNote)}</p></div>`:''}
  `;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlayBg').classList.add('show');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlayBg').classList.remove('show');
}

// ── 主渲染 ──
function render(){
  if(!D)return;
  const items=D.snapshot.items||[];
  const ranked=rank(items);
  const focus=pickFocus(ranked);
  const inds=sumInd(ranked);
  const src=D.source||'unknown';const live=src==='live'||src==='live-cache';
  const predItems=PRED?.predictions??[];
  const hotThemes=buildHotThemes(ranked,predItems);
  const indL=['全部',...inds.map(i=>i.n)];if(!indL.includes(IND))IND='全部';
  const hotC=predItems.length>0?[...new Set(predItems.flatMap(p=>p.concepts??[]))].slice(0,15):[];
  const displayConcepts=hotC.length>0?hotC:CORE_CONCEPTS;

  const q=Q.trim().toLowerCase();
  const flt=s=>{
    if(IND!=='全部'&&s.industry!==IND)return false;
    if(CON&&!((s.concepts??[]).includes(CON)))return false;
    if(q&&!(s.name||'').toLowerCase().includes(q)&&!(s.code||'').toLowerCase().includes(q))return false;
    return true;
  };
  const fF=focus.filter(flt),rF=ranked.filter(flt),top50=rF.slice(0,50);
  const preds=predItems.filter(p=>p.price<=90&&!String(p.code).startsWith('688')).slice(0,30);

  document.getElementById('app').innerHTML=`
    <div class="hdr">
      <div><h1>Scope</h1><span class="hdr-sm">A股价值筛选 · 买入卖出点 + 安全边际</span></div>
      <div class="hdr-r">
        <span class="pill ${live?'live':'err'}">${live?'实时':'样例'}</span>
        <span class="hdr-sm">${ranked.length}只候选 · ${focus.length}只重点</span>
        <span class="hdr-sm">数据时间：${D.snapshot?.generatedAt?new Date(D.snapshot.generatedAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}</span>
        <button class="btn" onclick="load()">刷新</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${TAB==='home'?'on':''}" onclick="TAB='home';render()">今日热点</div>
      <div class="tab ${TAB==='daily'?'on':''}" onclick="TAB='daily';render()">每日推荐</div>
      <div class="tab ${TAB==='focus'?'on':''}" onclick="TAB='focus';render()">重点关注</div>
      <div class="tab ${TAB==='top50'?'on':''}" onclick="TAB='top50';render()">总榜Top50</div>
      <div class="tab ${TAB==='limitup'?'on':''}" onclick="TAB='limitup';render()">涨停预测</div>
      <div class="tab ${TAB==='etf'?'on':''}" onclick="TAB='etf';render()">ETF/LOF</div>
    </div>
    ${TAB==='home'?'':`
    <div class="chips">
      <span class="chip ${CON===''?'on':''}" onclick="CON='';render()">全部概念</span>
      ${displayConcepts.map(c=>`<span class="chip ${CON===c?'on':''}" onclick="CON='${esc(c)}';render()">${esc(c)}</span>`).join('')}
    </div>
    <div class="bar">
      <input type="text" id="sInput" placeholder="搜索名称或代码..." value="${esc(Q)}">
      <select id="indSel">${indL.map(i=>`<option value="${esc(i)}" ${i===IND?'selected':''}>${esc(i)}</option>`).join('')}</select>
      <span class="info">${TAB==='daily'?'推荐 10 只':TAB==='focus'?'重点 '+fF.length:TAB==='top50'?'Top '+top50.length:TAB==='limitup'?'预测 '+preds.length:'ETF '+(ETFS?.etfs?.length||0)}</span>
    </div>`}
    ${renderTab(fF,top50,preds,hotThemes,ranked)}
  `;
  const si=document.getElementById('sInput');
  if(si){
    si.value=Q;
    si.addEventListener('compositionstart',()=>{isComposing=true});
    si.addEventListener('compositionend',e=>{isComposing=false;Q=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(()=>render(),100)});
    si.addEventListener('input',e=>{if(isComposing)return;Q=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(()=>render(),200)});
    if(Q)si.focus();
  }
  document.getElementById('indSel')?.addEventListener('change',e=>{IND=e.target.value;render()});
}

function renderTab(fF,top50,preds,themes,ranked){
  if(TAB==='home')return renderHome(themes,ranked,preds);
  if(TAB==='daily')return renderDailyPick(ranked);
  if(TAB==='focus')return renderWatchlist(ranked);
  if(TAB==='top50')return renderStockTable(top50,'总榜 Top 50','全市场排名');
  if(TAB==='limitup')return renderLimitup(preds,ranked);
  if(TAB==='etf')return renderEtf(ETFS?.etfs??[]);
  return '';
}

// ── 自选股列表 ──
function renderWatchlist(ranked){
  const stocks=WATCHLIST.map(code=>ranked.find(s=>s.code===code)).filter(Boolean);

// ── 每日推荐：全市场综合10只 ──
function renderDailyPick(ranked){
  const TECH_KEYWORDS=['半导体','芯片','存储','AI','算力','光通信','光学','光电子','显示','CPO','具身智能','物理AI','机器人','传感器','封测','消费电子','电子','通信','软件','计算机','数据','人工智能','智能驾驶','ARVR'];
  const BANK_KEYWORDS=['银行','保险','证券','信托','金融'];
  const isTech=s=>{const ind=s.industry||'';const con=s.concepts||[];return TECH_KEYWORDS.some(kw=>ind.includes(kw)||con.some(c=>c.includes(kw)))};
  const isBank=s=>{const ind=s.industry||'';return BANK_KEYWORDS.some(kw=>ind.includes(kw))};

  // 候选：正安全边际 + 核心分≥65 + 非高估
  const candidates=ranked.filter(s=>{
    if(s._mg==null||s._mg<=0)return false;
    if(s._c<65)return false;
    if(s._tier==='高估'||s._tier==='偏高估')return false;
    return true;
  });

  const picked=[];
  let bankCount=0;

  // 第一轮：科技产业优先
  for(const s of candidates){
    if(picked.length>=10)break;
    if(isTech(s))picked.push(s);
  }
  // 第二轮：补充非银行产业
  for(const s of candidates){
    if(picked.length>=10)break;
    if(picked.find(p=>p.code===s.code))continue;
    if(isBank(s))continue;
    picked.push(s);
  }
  // 第三轮：银行最多2只
  for(const s of candidates){
    if(picked.length>=10)break;
    if(picked.find(p=>p.code===s.code))continue;
    if(isBank(s)&&bankCount<2){picked.push(s);bankCount++}
  }

  return`<div class="sec">
    <div class="sec-h"><h2>每日综合推荐 Top 10</h2><span class="sub">正安全边际 + 核心分≥65 · 科技优先 · 银行最多2只</span></div>
    <div class="tw"><table><thead><tr>
      <th>#</th><th>名称</th><th>现价</th><th>买入区间</th><th>理想价值</th><th>安全边际</th><th>空间</th><th>行业</th><th>估值</th><th>生意模式</th>
    </tr></thead><tbody>
    ${picked.map((s,i)=>{
      const up=s._op?((s._op-s.price)/Math.max(s.price,1)*100):null;
      const isTechStock=isTech(s);
      return`<tr style="cursor:pointer" onclick="openDetail('${esc(s.code)}')">
        <td>${i+1}</td>
        <td><div class="nm"><b>${esc(s.name)}</b><small>${esc(s.code)}</small></div></td>
        <td class="pr">¥${f(s.price)}</td>
        <td class="bz">${s._bl!=null?'¥'+f(s._bl,1)+' ~ ¥'+f(s._bh,1):'-'}</td>
        <td class="iv">${s._op!=null?'¥'+f(s._op,1):'-'}</td>
        <td class="mg ${s._mg>=20?'mg-h':s._mg>=10?'mg-o':'mg-l'}">${fp(s._mg)}</td>
        <td class="up">${up!=null?'+'+up.toFixed(0)+'%':'-'}</td>
        <td><span class="tag ${isTechStock?'g':''}">${esc(s.industry)}</span></td>
        <td><span class="tag ${s._tier==='低估'||s._tier==='合理偏低'?'g':s._tier==='合理'||s._tier==='合理偏高'?'y':'r'}">${esc(s._tier)}</span></td>
        <td class="br">${esc(s.businessBrief||'-')}</td>
      </tr>`;
    }).join('')}
    ${picked.length===0?'<tr><td colspan="10" style="text-align:center;color:var(--mt);padding:16px">暂无符合条件的推荐</td></tr>':''}
    </tbody></table></div>
  </div>`;
}

// ── 今日热点 ──
function renderHome(themes,ranked,preds){
  const maxH=themes[0]?.heat||1;
  return`
    <div class="sec">
      <div class="sec-h"><h2>今日主力资金流入题材</h2><span class="sub">涨停活跃+候选数量+均分 排序 · 点击题材看详情</span></div>
      <div class="hot-grid">
        ${themes.map(t=>{
          const pct=Math.round(t.heat/maxH*100);
          const stocks=stocksForConcept(ranked,t.name,10);
          const sc=t.avg>=75?'score-hi':t.avg>=65?'score-md':'score-lo';
          return`<div class="hot-card" onclick="CON='${esc(t.name)}';TAB='focus';render()">
            <div class="hd"><h3>${esc(t.name)}</h3><span class="ct">${t.pc>0?t.pc+'涨停 ':''}${t.sc}只</span></div>
            <div class="hot-bar"><div class="fill" style="width:${pct}%"></div></div>
            <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
              <span class="score-badge ${sc}">均分 ${t.avg}</span>
              ${t.pc>0?'<span class="tag hot">有涨停信号</span>':''}
            </div>
            ${stocks.map(s=>{
              const bz=s.buyZoneLow!=null?'¥'+f(s.buyZoneLow,1)+'~¥'+f(s.buyZoneHigh,1):'-';
              const mg=s.marginOfSafety;
              return`<div class="hs-row" onclick="event.stopPropagation();openDetail('${esc(s.code)}')">
                <div class="hs-name"><b>${esc(s.name)}</b></div>
                <div class="hs-pr">¥${f(s.price)}</div>
                <div class="hs-bz">${bz}</div>
                <div class="hs-mg ${mg>=20?'mg-h':mg>=10?'mg-o':'mg-l'}">${fp(mg)}</div>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>
    ${preds.length>0?`
    <div class="sec">
      <div class="sec-h"><h2>十日内最可能涨停</h2><span class="sub">Top 8 · 点击看详情</span></div>
      <div class="tw"><table><thead><tr>
        <th>名称</th><th>现价</th><th>概率</th><th>总分</th><th>买入区间</th><th>安全边际</th><th>信号</th><th>操作</th>
      </tr></thead><tbody>
      ${preds.slice(0,8).map(p=>{
        const prob=p.probability||'-';const pc=prob.includes('高')?'prob-hi':prob.includes('中')?'prob-md':'prob-lo';
        const rz=ranked.find(r=>r.code===p.code);
        const bz=rz&&rz._bl!=null?'¥'+f(rz._bl,1)+'~¥'+f(rz._bh,1):'-';
        const mg=rz?rz._mg:null;
        return`<tr style="cursor:pointer" onclick="openDetail('${esc(p.code)}')">
          <td><div class="nm"><b>${esc(p.name)}</b><small>${esc(p.code)}</small></div></td>
          <td class="pr">¥${f(p.price)}</td>
          <td><span class="prob ${pc}">${esc(prob)}</span></td>
          <td><b>${p.totalScore?.toFixed(1)||'-'}</b></td>
          <td class="bz">${bz}</td>
          <td class="mg ${mg>=20?'mg-h':mg>=10?'mg-o':'mg-l'}">${fp(mg)}</td>
          <td>${(p.signals??[]).slice(0,2).map(s=>'<span class="sig">'+esc(s)+'</span>').join('')}</td>
          <td><span class="tag ${p.action?.includes('强烈')?'g':p.action?.includes('积极')?'g':p.action?.includes('纳入')?'y':''}">${esc(p.action||'-')}</span></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>
    </div>`:''}`;
}

function renderLimitup(preds,ranked){
  return`<div class="sec"><div class="sec-h"><h2>十日内最可能涨停</h2><span class="sub">安全边际+生意模式占25%权重 · 点击看详情</span></div>
  <div class="tw"><table><thead><tr>
    <th>名称</th><th>现价</th><th>内在价值</th><th>安全边际</th><th>概率</th><th>总分</th><th>预计时间</th><th>信号</th><th>操作</th>
  </tr></thead><tbody>
  ${preds.length===0?'<tr><td colspan="9" style="text-align:center;color:var(--mt);padding:16px">暂无预测数据</td></tr>':''}
  ${preds.map(p=>{
    const prob=p.probability||'-';const pc=prob.includes('高')?'prob-hi':prob.includes('中')?'prob-md':'prob-lo';
    const d=p.dimensions||{};
    // 从 ranked 获取安全边际和内在价值
    const rz=ranked.find(r=>r.code===p.code);
    const intrinsic=rz?rz._op:null;
    const mg=rz?rz._mg:null;
    // 预计未来涨停时间：根据涨停频率和最近一次涨停推算
    const recent=p.recentLimitup||[];
    const count=p.limitupCount||0;
    let estTime='-';
    if(count>0&&recent.length>0){
      const lastDate=recent[recent.length-1]?.date;
      if(lastDate){
        const daysSince=Math.floor((Date.now()-new Date(lastDate))/86400000);
        // 平均涨停间隔（一年365天/涨停次数）
        const avgInterval=Math.round(365/Math.max(count,1));
        // 距离上次涨停的天数
        const daysToNext=Math.max(0,avgInterval-daysSince);
        if(daysSince<=5)estTime='近期刚涨停，随时可能再涨';
        else if(daysToNext<=5)estTime='预计5天内';
        else if(daysToNext<=10)estTime='预计10天内';
        else if(daysToNext<=20)estTime='预计20天内';
        else estTime='预计'+daysToNext+'天后';
      }
    }else if(count>0){
      estTime='有涨停基因，时间不确定';
    }
    return`<tr style="cursor:pointer" onclick="openDetail('${esc(p.code)}')">
      <td><div class="nm"><b>${esc(p.name)}</b><small>${esc(p.code)}</small></div></td>
      <td class="pr">¥${f(p.price)}</td>
      <td class="iv">${intrinsic!=null?'¥'+f(intrinsic,1):'-'}</td>
      <td class="mg ${mg>=20?'mg-h':mg>=10?'mg-o':'mg-l'}">${mg!=null?fp(mg):'-'}</td>
      <td><span class="prob ${pc}">${esc(prob)}</span></td>
      <td><b>${p.totalScore?.toFixed(1)||'-'}</b></td>
      <td style="font-size:11px">${esc(estTime)}</td>
      <td>${(p.signals??[]).slice(0,2).map(s=>'<span class="sig">'+esc(s)+'</span>').join('')}</td>
      <td><span class="tag ${p.action?.includes('强烈')?'g':p.action?.includes('积极')?'g':p.action?.includes('纳入')?'y':''}">${esc(p.action||'-')}</span></td>
    </tr>`;
  }).join('')}
  </tbody></table></div></div>`;
}
